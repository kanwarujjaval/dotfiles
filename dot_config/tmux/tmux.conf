##### Core #####

set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -s extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

set -sg escape-time 10
set -g focus-events on
set -g history-limit 200000
set -g display-time 3000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -s set-clipboard external
set -g mouse on
setw -g mode-keys vi
set -g status-keys vi

##### Prefix #####

unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Windows and splits (preserve cwd) #####

bind c new-window -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

##### Vim-style pane navigation #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Vim-style pane resize (repeatable) #####

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Session / window management #####

bind s choose-tree -Zs
bind w choose-tree -Zw
bind C new-session
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1
bind z resize-pane -Z
bind D choose-client -Z
bind S command-prompt -p "switch session:" "switch-client -t '%%'"
bind y setw synchronize-panes \; display-message "sync panes: #{?pane_synchronized,on,off}"

##### Popup shell #####

bind g display-popup -E -w 80% -h 80% -d '#{pane_current_path}'

##### Reload config #####

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

##### Copy mode (vi-style) #####

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

##### Pane borders #####

set -g pane-border-status off
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour250'

##### Status line (minimal) #####

set -g status-position bottom
set -g status-interval 10
set -g status-style 'bg=default,fg=colour244'
set -g status-left-length 24
set -g status-right-length 40

setw -g window-status-separator ''
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[bold] #I:#W #[default]'

set -g status-left '#{?client_prefix,#[reverse] P #[default] ,}#S '
set -g status-right '#{?pane_in_mode,COPY ,}#{b:pane_current_path} %H:%M '

##### Local overrides (OS-specific shell, etc.) #####

source-file -q ~/.config/tmux/tmux.local.conf

##### Plugins (TPM) #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

run '~/.tmux/plugins/tpm/tpm'
