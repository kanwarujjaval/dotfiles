##### Core #####

set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -s extended-keys always
set -as terminal-features ',xterm-256color:extkeys'

set -sg escape-time 10
set -g focus-events on
set -g history-limit 200000
set -g display-time 3000

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

set -s set-clipboard external
set -g mouse on
setw -g mode-keys vi
set -g status-keys vi
set -g word-separators ' @"=()[]{}:,.'

##### Prefix #####

# Default: C-b (servers). macOS overrides to C-a in tmux.local.conf
# This allows nested sessions: local C-a → remote C-b
set -g prefix C-b
bind C-b send-prefix

##### Windows and splits (preserve cwd) #####

bind c command-prompt -p "new window:" "new-window -n '%%' -c '#{pane_current_path}'"
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

##### Vim-style pane navigation #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Vim-style pane resize (repeatable) #####

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Session / window management #####

bind s choose-tree -Zs
bind w choose-tree -Zw
bind C command-prompt -p "new session:" "new-session -s '%%'"
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1
bind z resize-pane -Z
bind D choose-client -Z
bind S command-prompt -p "switch session:" "switch-client -t '%%'"
bind y setw synchronize-panes \; display-message "sync panes: #{?pane_synchronized,on,off}"

# Restore defaults that may have been overridden by stale bindings or previous configs
# (tmux reload doesn't unbind — must explicitly reset these)
unbind [
unbind ]
unbind -T root M-[
unbind -T root M-]
bind [ copy-mode
bind ] paste-buffer -p

##### Sesh (smart session manager) #####

bind-key "T" run-shell "sesh connect \"$(
  sesh list | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

# Quick last-session toggle
bind-key "O" run-shell "sesh last"

##### Popup shell #####

bind g display-popup -E -w 80% -h 80% -d '#{pane_current_path}'

##### Reload config #####

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

##### Mouse toggle #####

# Toggle mouse on/off: when off, native terminal selection + Cmd+C/Cmd+V work
# When on, Shift+drag bypasses tmux for native selection (Ghostty/Kitty/iTerm2)
bind m set -g mouse \; display-message "mouse: #{?mouse,on,off}"

##### Copy mode (vi-style) #####

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Disable auto-copy on mouse drag end — use y (tmux) or Cmd+C (terminal) to copy
unbind -T copy-mode-vi MouseDragEnd1Pane

##### Pane borders #####

set -g pane-border-status off
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour250'

##### Status line (fallback — theme overrides at runtime) #####

set -g status-position bottom
set -g status-interval 10
set -g status-style 'bg=default,fg=colour244'
set -g status-left-length 80
set -g status-right-length 60

setw -g window-status-separator ''
setw -g window-status-format ' #I:#S:#W '
setw -g window-status-current-format '#[bold] #I:#S:#W #[default]'

set -g status-left '#S '
set -g status-right '#{b:pane_current_path} %H:%M '

##### Local overrides (OS-specific shell, etc.) #####

source-file -q ~/.config/tmux/tmux.local.conf

##### Plugins (TPM) #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'loctvl842/monokai-pro.tmux'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'jtmcginty/tmux-session-dots'

# Resurrect / Continuum
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Monokai Pro theme (valid modules: logo, mode, datetime)
set -g @monokai-pro-filter "machine"
set -g @monokai-pro_window_default_text "#S:#W"
set -g @monokai-pro_status_modules_left "logo"
set -g @monokai-pro_status_modules_right "mode datetime"
set -g @monokai-pro_window_left_separator ""
set -g @monokai-pro_window_right_separator ""
set -g @monokai-pro_window_middle_separator " "
set -g @monokai-pro_status_left_separator ""
set -g @monokai-pro_status_right_separator ""
set -g @monokai-pro-mode-prefix "PREFIX"
set -g @monokai-pro-mode-copy "COPY"
set -g @monokai-pro-mode-sync "SYNC"
set -g @monokai-pro-mode-empty "TMUX"
set -g @monokai-pro_date_time_text "%H:%M"

# Session dots (colored to match monokai-pro accent)
set -g @session-dots-active "●"
set -g @session-dots-inactive "○"
set -g @session-dots-color "#7cd5f1"

# tmux-fzf (set-environment so plugin scripts can read them)
set-environment -g TMUX_FZF_LAUNCH_KEY "F"
set-environment -g TMUX_FZF_ORDER "session|window|pane|command|keybinding|process"
set-environment -g TMUX_FZF_OPTIONS "-p -w 62% -h 38% -m"

run '~/.tmux/plugins/tpm/tpm'

# Post-TPM fixes (run after all plugins have initialized)
# Fix: tmux-sensible unconditionally overrides status-keys to emacs
set -g status-keys vi
# Inject session info into monokai-pro's status bar
# Note: #{session_dots} can't be used here — plugin already finished interpolation.
# Call the session-dots script directly instead.
set -ga status-left '#[fg=colour244] #S #[fg=#7cd5f1]#(~/.config/tmux/plugins/tmux-session-dots/scripts/session-dots.sh "#S" "●" "○")#[fg=colour238] │ #[fg=colour244]#h:#{b:pane_current_path}'
