packages:
  taps:
    - derailed/k9s

  # Formulae: ordered array of categories (preserves render order)
  formulae:
    - category: common
      packages:
        - bat
        - chezmoi
        - eza
        - fd
        - fish
        - fisher
        - fzf
        - neovim
        - ripgrep
        - starship
        - tmux
        - tree
        - zoxide

    - category: dev
      packages:
        - cocoapods
        - fnm
        - gh
        - openjdk
        - pipx
        - pyenv
        - python@3.11

    - category: devops
      packages:
        - "derailed/k9s/k9s"
        - helm
        - k6
        - kustomize

    - category: ai
      packages:
        - gemini-cli

    - category: system
      packages:
        - bottom
        - wget
        - ykman

  # Casks: ordered array of categories
  casks:
    - category: dev_tools
      packages:
        - android-commandlinetools
        - bruno
        - claude-code
        - codex
        - codex-app
        - coteditor
        - ghostty
        - mongodb-compass
        - orbstack
        - visual-studio-code

    - category: productivity
      packages:
        - alfred
        - bartender
        - chatgpt
        - claude
        - discord
        - figma
        - freedom
        - maccy
        - mos
        - slack
        - soulver
        - zoom

    - category: security
      packages:
        - 1password-cli
        - hush
        - ivpn
        - knockknock
        - little-snitch
        - micro-snitch
        - yubico-authenticator

    - category: system
      packages:
        - appcleaner
        - google-chrome
        - google-drive
        - keka
        - lunar
        - syncthing-app
        # tg-pro: temporarily removed — upstream checksum mismatch
        - trezor-suite

    - category: media
      packages:
        - handbrake-app
        - vlc

    - category: fonts
      packages:
        - font-hasklig
        - font-sauce-code-pro-nerd-font
        - font-terminus

  # Linux apt packages (different names where needed)
  apt:
    - category: common
      packages:
        - bat
        - fd-find
        - fish
        - fzf
        - neovim
        - ripgrep
        - tailscale
        - tmux
        - tree

  # npm global packages (installed via fnm/node)
  npm:
    - ccusage

  # Not managed by brew - documented here as the canonical record
  manual:
    - { name: 1Password, platform: mac, reason: standalone install }
    - { name: Docker, platform: mac, reason: OrbStack replaces Docker Desktop }
    - { name: Docker Engine, platform: linux, reason: official apt repo install }
    - { name: Mem, platform: mac, reason: standalone install }
    - { name: SSH Config Editor, platform: mac, reason: Mac App Store }
    - { name: Tailscale, platform: mac, reason: "standalone install (https://tailscale.com/docs/install/mac)" }
    - { name: Amphetamine, platform: mac, reason: Mac App Store }
    - { name: Bear, platform: mac, reason: Mac App Store }
    - { name: DaisyDisk, platform: mac, reason: Mac App Store }
    - { name: Dropover, platform: mac, reason: Mac App Store }
    - { name: GoodLinks, platform: mac, reason: Mac App Store }
    - { name: Reeder, platform: mac, reason: Mac App Store }
    - { name: Velja, platform: mac, reason: Mac App Store }
    - { name: Wipr, platform: mac, reason: Mac App Store }
